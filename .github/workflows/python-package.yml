name: Python + Docker CI

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v4  
    - name: Build Docker image
      run: docker build -t my-app .
    - name: Run container
      run: docker run my-app
